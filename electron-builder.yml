appId: com.freewill.seedance
productName: Freewill Seedance 2.0
copyright: Copyright (c) 2026 Freewill

directories:
  output: release
  buildResources: electron

files:
  - "dist/**/*"
  - "electron/main.cjs"
  - "electron/preload.cjs"
  - "electron/icon.png"
  - "public/**/*"
  - "node_modules/electron-updater/**/*"
  - "node_modules/lazy-val/**/*"
  - "node_modules/semver/**/*"
  - "node_modules/builder-util-runtime/**/*"
  - "node_modules/sax/**/*"
  - "node_modules/js-yaml/**/*"
  - "node_modules/argparse/**/*"
  - "node_modules/tiny-typed-emitter/**/*"
  - "!src"
  - "!temp-repo"

extraResources:
  - from: "dist-server/"
    to: "."
    filter:
      - "server.cjs"
  - from: "dist/"
    to: "dist"

win:
  target:
    - target: nsis
      arch: [x64]
  icon: electron/icon.png

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Freewill Seedance 2.0

publish:
  provider: github
  owner: productionkhu-tech
  repo: freewill-seedance
  releaseType: release
